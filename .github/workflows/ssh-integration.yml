name: SSH Integration

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ssh-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ssh-integration:
    name: OpenSSH authentication and SFTP
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-install-suggests \
            build-essential \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libudev-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Run SSH integration suite
        run: ./script/run_ssh_integration.sh
